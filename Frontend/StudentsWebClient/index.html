<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <h1>Student Management System</h1>

        <button id="openAddModalBtn" class="btn btn-primary">
          + Add Student
        </button>
      </div>
    </div>
  </header>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <main class="container">

    <!-- ALERT MESSAGE -->
    <div id="alertBox"></div>

    <!-- SEARCH SECTION -->
    <section class="card search-card">
      <h2>Search Student By ID</h2>

      <div class="search-wrapper">
        <input
          type="number"
          id="searchStudentId"
          placeholder="Enter Student ID"
        />

        <button id="searchBtn" class="btn btn-secondary">
          Search
        </button>
      </div>

      <div id="searchResult"></div>
    </section>

    <!-- STUDENTS TABLE -->
    <section class="card">
      <div class="section-header">
        <h2>All Students</h2>

        <button id="refreshBtn" class="btn btn-outline">
          Refresh
        </button>
      </div>

      <!-- LOADING -->
      <div id="loading" class="loading hidden">
        Loading students...
      </div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty-state hidden">
        No students found.
      </div>

      <!-- TABLE -->
      <div class="table-wrapper">
        <table id="studentsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Age</th>
              <th>Grade</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="studentsTableBody">
            <!-- Dynamic Rows -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- =========================
       ADD / UPDATE MODAL
  ========================== -->
  <div id="studentModal" class="modal hidden">

    <div class="modal-content">

      <div class="modal-header">
        <h2 id="modalTitle">Add Student</h2>

        <button id="closeModalBtn" class="close-btn">
          &times;
        </button>
      </div>

      <form id="studentForm">

        <input type="hidden" id="studentId" />

        <div class="form-group">
          <label>Name</label>

          <input
            type="text"
            id="studentName"
            placeholder="Enter student name"
            required
          />
        </div>

        <div class="form-group">
          <label>Age</label>

          <input
            type="number"
            id="studentAge"
            placeholder="Enter age"
            required
          />
        </div>

        <div class="form-group">
          <label>Grade</label>

          <input
            type="number"
            id="studentGrade"
            placeholder="Enter grade"
            required
          />
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn btn-outline">
            Cancel
          </button>

          <button type="submit" class="btn btn-primary">
            Save Student
          </button>
        </div>

      </form>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
